name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  checks: write

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    env:
      USERNAME: "${{ secrets.USERNAME }}"
      PASSWORD: "${{ secrets.PASSWORD }}"
      API_KEY: "${{ secrets.API_KEY }}"
      BROWSER: ${{ vars.BROWSER || 'chrome' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Java for Allure Report
      run: apt-get update && apt-get install -y openjdk-21-jre

    - name: Install dependencies
      run: npm i

    - name: Install Playwright Browser
      run: npx playwright install "$BROWSER"

    - name: Run Playwright tests
      run: npx playwright test specs/api
      timeout-minutes: 1

    - name: Upload Output Folder
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: './test-results'
        retention-days: 2
        
    - name: Load test report history
      if: always()
      continue-on-error: true
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Test Report
      uses: simple-elf/allure-report-action@v1.13
      if: always()
      with:
        gh-pages: gh-pages
        allure-hsitory: allure-history
        allure-results: ./test-results

    - name: Publish Test Report
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
