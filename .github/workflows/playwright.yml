name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Run Playwright Tests
    environment:
        name: test
        url: https://augustineautogit.github.io/testmu-sdet2-augustine/${{ github.run_number }}/index.html
    runs-on: ubuntu-latest
    env:
      # USERNAME: "${{ secrets.USERNAME }}"
      # PASSWORD: "${{ secrets.PASSWORD }}"
      # API_KEY: "${{ secrets.API_KEY }}"
      BROWSER: ${{ vars.BROWSER || 'chrome' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm i

    # - name: Install Playwright Browser
    #   run: npx playwright install "$BROWSER"

    - name: Run Playwright tests
      run: npx playwright test specs/api
      timeout-minutes: 1

    - name: Upload Output Folder
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: 'test-results'
        retention-days: 2
        
    - name: Load test report history
      if: always()
      continue-on-error: true
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: gh-pages

    - name: Build Test Report
      uses: simple-elf/allure-report-action@v1.13
      if: always()
      id: allure-report
      with:
        allure_results: test-results
        gh_pages: gh-pages
        allure_report: allure-report
        allure_history: allure-history
        

    - name: Publish Test Report
      if: always()
      uses: peaceiris/actions-gh-pages@v4
      with:
        PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PUBLISH_BRANCH: gh-pages
        PUBLISH_DIR: allure-history
